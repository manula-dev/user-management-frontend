<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="navbar">
  <h3>User Management</h3>
  <div>
    <button onclick="toggleDark()">🌙</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>    

<div class="auth-container">
  <div class="dashboard-layout"> 
    
    <!-- Sidebar -->
    <div class="sidebar card">   
      <h2>Dashboard</h2>
      <div id="userInfo">
      <button onclick="loadProfile()">Load My Profile</button>
      <button onclick="logout()">Logout</button>
      </div>
    </div>   

    <!-- Main content -->
    <div class="main-content">
     
      <div class="card edit-form">
      <h3>Edit Profile ✏️</h3>

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="editName" placeholder="name" />
      </div>    
      
      <div class="form-group">
      <label>Email</label>
      <input type="text" id="editEmail" placeholder="email" />
      </div>  

      <div class="form-group">
      <label>Profile Image</label>
      <input type="file" id="imageInput" accept="image/*" placeholder="image" />
      </div>  

      <!-- Image preview -->
      <img id="previewImg" alt="preview" />

      <button class="btn btn-primary" onclick="updateProfile()">Save Changes</button>

    </div>    
  </div>
</div>    

<script src="app.js"></script>
<script>
loadProfile();
</script>
</body>
</html>
